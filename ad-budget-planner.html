<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Budget Planner | Jawad Digital Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: black; color: white; margin: 0; }
        .gold-glow { box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        #side-drawer { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="fixed top-0 w-full z-[100] px-6 py-5 md:px-12 flex justify-between items-center bg-black/80 backdrop-blur-lg border-b border-yellow-600/10">
        <a href="index.html" class="flex items-center space-x-2 group">
            <div class="w-10 h-10 bg-gradient-to-tr from-yellow-700 to-yellow-400 flex items-center justify-center rounded-xl gold-glow">
                <span class="text-black font-black text-lg">J</span>
            </div>
            <div class="text-xl font-black tracking-tighter uppercase text-white">JAWAD<span class="text-yellow-500">HUB</span></div>
        </a>
        <div class="hidden md:flex flex-1 justify-center space-x-10 text-[10px] font-bold uppercase tracking-[0.3em] text-gray-400">
            <a href="index.html" class="hover:text-yellow-500 transition-colors">Home</a>
            <a href="blog.html" class="hover:text-yellow-500 transition-colors">Blog</a>
            <a href="contact.html" class="text-yellow-500 hover:text-white transition-colors">Contact Us</a>
        </div>
        <button id="open-menu" class="md:hidden text-yellow-500 p-1"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 8h16M4 16h16"></path></svg></button>
    </nav>

    <div id="side-drawer" class="fixed inset-0 bg-black z-[110] transform translate-x-full md:hidden flex flex-col text-center">
        <div class="p-8 flex justify-between items-center border-b border-yellow-600/10 pb-6 mb-12">
            <span class="text-white font-black text-2xl tracking-tighter uppercase">JAWAD<span class="text-yellow-500">HUB</span></span>
            <button id="close-menu" class="text-yellow-500 p-1"><svg class="w-9 h-9" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
        </div>
        <nav class="flex flex-col space-y-10 text-white text-3xl font-bold uppercase flex-grow">
            <a href="index.html" class="mobile-nav-link hover:text-yellow-500">Home</a>
            <a href="blog.html" class="mobile-nav-link hover:text-yellow-500">Blog</a>
            <a href="contact.html" class="mobile-nav-link text-yellow-500 italic font-black">Contact</a>
        </nav>
    </div>

    <main class="pt-40 pb-20 px-6 max-w-6xl mx-auto min-h-screen fade-in">
        <header class="mb-16 text-center">
            <h1 class="text-5xl md:text-8xl font-black italic uppercase tracking-tighter leading-none">Budget <span class="text-yellow-500">Planner.</span></h1>
            <p class="text-gray-500 mt-6 tracking-[0.3em] uppercase text-[10px]">Strategic Advertising Projections for Premium Brands</p>
        </header>

        <div class="bg-[#0A0A0A] border border-white/5 rounded-[3rem] p-8 md:p-16 gold-glow relative overflow-hidden">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
                <div class="space-y-10 text-left">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500 mb-3">Target Revenue ($)</label>
                            <input type="number" id="targetRevenue" placeholder="10000" class="w-full bg-transparent border-b border-white/10 py-3 text-2xl font-bold outline-none focus:border-yellow-500 transition-all">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500 mb-3">Target ROAS</label>
                            <input type="number" id="targetRoas" value="3.0" step="0.1" class="w-full bg-transparent border-b border-white/10 py-3 text-2xl font-bold outline-none focus:border-yellow-500 transition-all">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500 mb-3">Primary Platform</label>
                            <select id="platform" class="w-full bg-zinc-900 border border-white/10 rounded-xl p-4 text-sm font-bold text-yellow-500 outline-none">
                                <option value="1.0">Meta Ads (FB/IG)</option>
                                <option value="1.15">Google Search (High Intent)</option>
                                <option value="0.9">TikTok (Viral Potential)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500 mb-3">Market Season</label>
                            <select id="season" class="w-full bg-zinc-900 border border-white/10 rounded-xl p-4 text-sm font-bold text-white outline-none">
                                <option value="1">Regular Season</option>
                                <option value="1.4">Q4 (Black Friday/Peak)</option>
                                <option value="0.85">Low Season (Off-Peak)</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500 mb-3">Product Average Price ($)</label>
                        <input type="number" id="avgPrice" placeholder="50" class="w-full bg-transparent border-b border-white/10 py-3 text-2xl font-bold outline-none focus:border-yellow-500 transition-all">
                    </div>

                    <button onclick="calculate()" class="w-full bg-yellow-500 text-black font-black py-6 rounded-2xl uppercase italic tracking-[0.2em] hover:bg-white transition-all transform hover:-translate-y-1">Generate Strategy</button>
                </div>

                <div class="bg-gradient-to-br from-zinc-900 to-black rounded-[2.5rem] p-10 border border-yellow-500/10 flex flex-col justify-between shadow-2xl relative">
                    <div class="space-y-10 text-left relative z-10">
                        <div>
                            <span class="text-[10px] font-black uppercase tracking-widest text-yellow-500/50 block mb-2">Recommended Daily Spend:</span>
                            <h2 id="dailyRes" class="text-6xl font-black text-white italic tracking-tighter">$0</h2>
                        </div>
                        <div>
                            <span class="text-[10px] font-black uppercase tracking-widest text-yellow-500/50 block mb-2">Total Monthly Budget:</span>
                            <h2 id="monthlyRes" class="text-5xl font-black text-white tracking-tighter">$0</h2>
                        </div>
                        <div class="pt-8 border-t border-white/5">
                            <span class="text-[10px] font-black uppercase tracking-widest text-zinc-600 block mb-2">Expected Sales Volume:</span>
                            <h2 id="salesRes" class="text-3xl font-black text-yellow-500 italic">0 Units</h2>
                        </div>
                    </div>
                    <div class="absolute bottom-0 right-0 p-8 opacity-5">
                        <div class="text-8xl font-black uppercase italic tracking-tighter">DATA</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-black border-t border-white/5 pt-24 pb-12 text-center">
        <div class="text-2xl font-black tracking-tighter uppercase text-white mb-6">JAWAD<span class="text-yellow-500">HUB</span></div>
        <p class="text-[9px] uppercase tracking-[0.4em] text-gray-600 font-bold">© 2026 JAWAD DIGITAL HUB. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
        // Menu Scripts
        const sideDrawer = document.getElementById('side-drawer');
        document.getElementById('open-menu').onclick = () => sideDrawer.classList.remove('translate-x-full');
        document.getElementById('close-menu').onclick = () => sideDrawer.classList.add('translate-x-full');

        function calculate() {
            const rev = parseFloat(document.getElementById('targetRevenue').value) || 0;
            const roas = parseFloat(document.getElementById('targetRoas').value) || 1;
            const platformMult = parseFloat(document.getElementById('platform').value);
            const seasonMult = parseFloat(document.getElementById('season').value);
            const price = parseFloat(document.getElementById('avgPrice').value) || 1;

            // Advanced Calculation Logic
            const baseMonthly = (rev / roas);
            const adjustedMonthly = baseMonthly * platformMult * seasonMult;
            const daily = adjustedMonthly / 30;
            const sales = rev / price;

            // UI Update with animations (simulated by innerText)
            document.getElementById('dailyRes').innerText = `$${Math.round(daily).toLocaleString()}`;
            document.getElementById('monthlyRes').innerText = `$${Math.round(adjustedMonthly).toLocaleString()}`;
            document.getElementById('salesRes').innerText = `${Math.round(sales).toLocaleString()} Units`;
        }
    </script>
</body>
</html>
