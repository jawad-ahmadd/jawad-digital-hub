<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Blog Detail | Jawad Digital Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: black; color: white; margin: 0; line-height: 1.6; }
        .gold-glow { box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        
        /* Typography for Long-Form Articles */
        .article-content h2 { font-size: 2.25rem; font-weight: 900; color: #eab308; margin-top: 3rem; margin-bottom: 1.5rem; text-transform: uppercase; font-style: italic; letter-spacing: -0.025em; }
        .article-content h3 { font-size: 1.5rem; font-weight: 700; color: white; margin-top: 2rem; margin-bottom: 1rem; }
        .article-content p { font-size: 1.125rem; color: #a1a1aa; margin-bottom: 1.5rem; }
        .article-content ul { list-style-type: none; margin-bottom: 1.5rem; }
        .article-content li { position: relative; padding-left: 1.5rem; margin-bottom: 0.75rem; color: #d4d4d8; }
        .article-content li::before { content: "→"; position: absolute; left: 0; color: #eab308; font-weight: bold; }
        
        /* Fast drawer transition */
        #side-drawer { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="fixed top-0 w-full z-[100] px-6 py-5 md:px-12 flex justify-between items-center bg-black/80 backdrop-blur-lg border-b border-yellow-600/10">
        <a href="index.html" class="flex items-center space-x-2 group">
            <div class="w-10 h-10 bg-gradient-to-tr from-yellow-700 to-yellow-400 flex items-center justify-center rounded-xl gold-glow">
                <span class="text-black font-black text-lg">J</span>
            </div>
            <div class="text-xl font-black tracking-tighter uppercase text-white">JAWAD<span class="text-yellow-500">HUB</span></div>
        </a>
        <div class="hidden md:flex flex-1 justify-center space-x-10 text-[10px] font-bold uppercase tracking-[0.3em] text-gray-400">
            <a href="index.html#home" class="hover:text-yellow-500 transition-colors">Home</a>
            <a href="index.html#about" class="hover:text-yellow-500 transition-colors">About</a>
            <a href="index.html#services" class="hover:text-yellow-500 transition-colors">Services</a>
            <a href="index.html#pricing" class="hover:text-yellow-500 transition-colors">Pricing</a>
            <a href="index.html#portfolio" class="hover:text-yellow-500 transition-colors">Portfolio</a>
            <a href="blog.html" class="text-white border-b border-yellow-500">Blog</a>
            <a href="contact.html" class="text-yellow-500 hover:text-white transition-colors">Contact Us</a>
        </div>
        <button id="open-menu" class="md:hidden text-yellow-500 p-1"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 8h16M4 16h16"></path></svg></button>
    </nav>

    <div id="side-drawer" class="fixed inset-0 bg-black z-[110] transform translate-x-full md:hidden flex flex-col">
        <div class="p-8 flex justify-between items-center border-b border-yellow-600/10 pb-6 mb-12">
            <span class="text-white font-black text-2xl tracking-tighter">JAWAD<span class="text-yellow-500">HUB</span></span>
            <button id="close-menu" class="text-yellow-500"><svg class="w-9 h-9" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
        </div>
        <nav class="flex flex-col items-center space-y-10 text-white text-3xl font-bold uppercase tracking-tighter flex-grow px-8">
            <a href="index.html#home" class="mobile-nav-link hover:text-yellow-500">Home</a>
            <a href="index.html#about" class="mobile-nav-link hover:text-yellow-500">About</a>
            <a href="index.html#services" class="mobile-nav-link hover:text-yellow-500">Services</a>
            <a href="index.html#pricing" class="mobile-nav-link hover:text-yellow-500">Pricing</a>
            <a href="index.html#portfolio" class="mobile-nav-link hover:text-yellow-500">Portfolio</a>
            <a href="blog.html" class="mobile-nav-link text-yellow-500">Blog</a>
            <a href="contact.html" class="mobile-nav-link text-yellow-500 font-black italic">Contact Us</a>
        </nav>
    </div>

    <main class="pt-40 pb-20 px-6 max-w-4xl mx-auto min-h-screen">
        <article class="fade-in">
            <div class="text-[10px] uppercase tracking-[0.3em] text-yellow-600 mb-8 font-bold">
                <a href="blog.html" class="hover:text-white transition-colors">The Journal</a> / <span id="category-name">Insight</span>
            </div>

            <h1 id="blog-title" class="text-4xl md:text-7xl font-black italic uppercase tracking-tighter leading-[0.9] mb-12 text-white">
                </h1>

            <div class="rounded-[2.5rem] overflow-hidden border border-white/10 mb-16 aspect-video md:aspect-[21/9]">
                <img id="blog-image" src="" alt="Featured Image" class="w-full h-full object-cover">
            </div>

            <div id="blog-content" class="article-content">
                </div>
        </article>
    </main>

    <footer class="bg-black border-t border-white/5 pt-24 pb-12">
        <div class="text-center text-gray-600 text-[9px] tracking-[0.4em] uppercase">© 2026 JAWAD DIGITAL HUB.</div>
    </footer>

    <script>
    // 1. FAST NAV LOGIC
    const openBtn = document.getElementById('open-menu');
    const closeBtn = document.getElementById('close-menu');
    const sideDrawer = document.getElementById('side-drawer');

    openBtn.onclick = () => sideDrawer.classList.remove('translate-x-full');
    closeBtn.onclick = () => sideDrawer.classList.add('translate-x-full');

    // 2. THE CONTENT DATABASE (Dono Articles Yahan Hain)
    const blogData = {
        'ai-agents': {
            title: "How to Build a Custom AI Agent in 2026",
            category: "AI & Automation",
            image: "https://images.pexels.com/photos/8386440/pexels-photo-8386440.jpeg",
            content: `
                <p class="font-bold text-yellow-500 text-xl italic mb-8">In 2026, AI is no longer just a chatbot; it's an autonomous worker.</p>
                <p>The transition from generative AI to <strong>Agentic AI</strong> has officially redefined the digital landscape. A custom AI agent isn't just "smart"—it's integrated, decisive, and capable of executing complex workflows.</p>
                <h2>1. The Evolution: Chatbots vs. Autonomous Agents</h2>
                <p>Unlike the LLMs of 2023, modern agents possess three critical layers: Perception, Reasoning, and Action.</p>
                <h2>2. Architecture: Defining the "Brain"</h2>
                <p>In 2026, the industry standard has shifted toward specialized smaller models (SLMs) rather than massive generalist ones.</p>
                <h2>Summary: The Competitive Edge</h2>
                <p>Building a custom AI agent is the ultimate leverage. It allows a solopreneur to function like a 10-person agency.</p>
            `
        },
        'shopify-conversion': {
            title: "7 Shopify Conversion Killers to Fix Now",
            category: "E-commerce Optimization",
            image: "https://images.pexels.com/photos/230544/pexels-photo-230544.jpeg",
            content: `
                <p class="font-bold text-yellow-500 text-xl italic mb-8">In the 2026 digital economy, a 2% conversion rate is failure. If you aren't hitting 5%+, your funnel is leaking.</p>
                <p>After auditing 150+ high-ticket Shopify stores, I’ve identified the 7 critical killers sabotaging your ROI.</p>
                <h2>1. Decision Fatigue (The Paradox of Choice)</h2>
                <p>Overwhelming visitors with too many options is the fastest way to lose a sale. In 2026, the elite strategy is Hyper-Curated Collections.</p>
                <h2>2. 3-Second Latency (The Silent Bounce)</h2>
                <p>Every 100ms delay in your mobile load time results in a 7% drop in conversions. Optimize your liquid code.</p>
                <h2>3. One-Click Express Checkout</h2>
                <p>Friction is the enemy of profit. Implement Shop Pay, Apple Pay, and Google Pay to make the purchase seamless.</p>
                <div class="bg-yellow-500/10 p-8 rounded-3xl border border-yellow-500/20 mt-12">
                    <h4 class="text-white font-black uppercase text-lg mb-4 italic">The 2026 ROI Checklist</h4>
                    <ul class="text-sm space-y-2">
                        <li><span class="text-yellow-500 font-bold">✔</span> Mobile LCP under 1.5 seconds.</li>
                        <li><span class="text-yellow-500 font-bold">✔</span> Two or more Express Checkout options.</li>
                    </ul>
                </div>
            `
        }
    };

    // 3. RENDER LOGIC (Database ke khatam hone ke baad)
    const urlParams = new URLSearchParams(window.location.search);
    const blogId = urlParams.get('id');

    if (blogId && blogData[blogId]) {
        const data = blogData[blogId];
        document.getElementById('page-title').innerText = data.title + " | Jawad Hub";
        document.getElementById('category-name').innerText = data.category;
        document.getElementById('blog-title').innerText = data.title;
        document.getElementById('blog-image').src = data.image;
        document.getElementById('blog-content').innerHTML = data.content;
    } else {
        console.log("No valid blog ID found.");
    }
</script>
</body>
</html>
