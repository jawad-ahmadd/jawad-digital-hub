<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jawad Digital Hub | Premier Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: black; color: white; }
        .serif-font { font-family: 'Playfair Display', serif; }
        .gold-glow { box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="fixed top-0 w-full z-[100] px-6 py-5 md:px-12 flex justify-between items-center bg-black/80 backdrop-blur-lg border-b border-yellow-600/10">
        <a href="#home" class="flex items-center space-x-2 group">
            <div class="w-10 h-10 bg-gradient-to-tr from-yellow-700 to-yellow-400 flex items-center justify-center rounded-xl gold-glow group-hover:scale-110 transition-transform">
                <span class="text-black font-black text-lg">J</span>
            </div>
            <div class="text-xl font-black tracking-tighter uppercase text-white">
                JAWAD<span class="text-yellow-500">HUB</span>
            </div>
        </a>

        <div class="hidden md:flex flex-1 justify-center space-x-12 text-[10px] font-bold uppercase tracking-[0.3em] text-gray-400">
            <a href="#home" class="hover:text-yellow-500 transition-colors">Home</a>
            <a href="#about" class="hover:text-yellow-500 transition-colors">About</a>
            <a href="#services" class="hover:text-yellow-500 transition-colors">Services</a>
            <a href="#portfolio" class="hover:text-yellow-500 transition-colors">Portfolio</a>
        </div>

        <div class="flex items-center space-x-6">
            <a href="mailto:jawadriaz2009@gmail.com" class="hidden md:block bg-yellow-600 text-black px-8 py-3 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-white transition-all">
                Let's Talk
            </a>
            <button id="open-menu" class="md:hidden text-yellow-500 focus:outline-none">
                <svg class="w-9 h-9" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"></path></svg>
            </button>
        </div>
    </nav>

    <div id="side-drawer" class="fixed inset-0 bg-black z-[110] transform translate-x-full transition-transform duration-500 ease-in-out md:hidden">
        <div class="p-8 h-full flex flex-col justify-between">
            <div class="flex justify-between items-center border-b border-yellow-600/10 pb-6">
                <span class="text-white font-black text-2xl tracking-tighter">JAWAD<span class="text-yellow-500">HUB</span></span>
                <button id="close-menu" class="text-yellow-500 text-5xl font-light">&times;</button>
            </div>
            
            <nav class="flex flex-col items-center space-y-10 text-white text-3xl font-bold uppercase tracking-tighter">
                <a href="#home" class="m-link hover:text-yellow-500">Home</a>
                <a href="#about" class="m-link hover:text-yellow-500">About</a>
                <a href="#services" class="m-link hover:text-yellow-500">Services</a>
                <a href="#portfolio" class="m-link hover:text-yellow-500">Portfolio</a>
            </nav>

            <div class="flex justify-center space-x-10 pb-8 text-yellow-600 text-xs font-bold tracking-widest uppercase">
                <span>Instagram</span>
                <span>LinkedIn</span>
            </div>
        </div>
    </div>

    <main>
        </main>

    <script>
        const openBtn = document.getElementById('open-menu');
        const closeBtn = document.getElementById('close-menu');
        const drawer = document.getElementById('side-drawer');
        const links = document.querySelectorAll('.m-link');

        openBtn.onclick = () => drawer.classList.remove('translate-x-full');
        closeBtn.onclick = () => drawer.classList.add('translate-x-full');
        links.forEach(link => {
            link.onclick = () => drawer.classList.add('translate-x-full');
        });
    </script>

</body>
</html>
